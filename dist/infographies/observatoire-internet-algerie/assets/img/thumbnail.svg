<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Définitions -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#111729"/>
      <stop offset="100%" stop-color="#1a2238"/>
    </linearGradient>

    <radialGradient id="aurora" cx="0.85" cy="0.1" r="0.8">
      <stop offset="0%" stop-color="#d4a437" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d4a437" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="aurora2" cx="0.1" cy="0.95" r="0.6">
      <stop offset="0%" stop-color="#2d8a5f" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2d8a5f" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0b958"/>
      <stop offset="100%" stop-color="#d4a437"/>
    </linearGradient>

    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a437"/>
      <stop offset="100%" stop-color="#b85042"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grain pattern -->
    <pattern id="grain" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="none"/>
    </pattern>
  </defs>

  <!-- Fond -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#aurora)"/>
  <rect width="1200" height="800" fill="url(#aurora2)"/>

  <!-- Cadre subtil -->
  <rect x="20" y="20" width="1160" height="760" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1" rx="24"/>

  <!-- En-tête : marque -->
  <g transform="translate(60, 60)">
    <rect width="48" height="48" rx="10" fill="url(#markGrad)"/>
    <text x="24" y="32" text-anchor="middle" font-family="Courier New, monospace" font-size="14" font-weight="700" fill="#0a0e1a">A</text>
    <text x="64" y="22" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#f4ede0" letter-spacing="0.05em">Observatoire</text>
    <text x="64" y="42" font-family="Courier New, monospace" font-size="11" font-weight="500" fill="#94a3b8" letter-spacing="0.15em" text-transform="uppercase">INTERNET · ALGÉRIE</text>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(60, 200)">
    <line x1="0" y1="8" x2="32" y2="8" stroke="#d4a437" stroke-width="1.5"/>
    <text x="44" y="12" font-family="Courier New, monospace" font-size="13" font-weight="500" letter-spacing="0.2em" fill="#d4a437">SOURCE · ARPCE — T3 2025</text>
  </g>

  <!-- Titre principal -->
  <text x="60" y="290" font-family="Georgia, serif" font-size="68" font-weight="400" fill="#f4ede0" letter-spacing="-0.02em">Observatoire</text>
  <text x="60" y="370" font-family="Georgia, serif" font-size="68" font-weight="400" fill="#f4ede0" letter-spacing="-0.02em">du Marché de</text>
  <text x="60" y="450" font-family="Georgia, serif" font-size="68" font-weight="400" font-style="italic" fill="url(#goldGrad)" letter-spacing="-0.02em">l'Internet en Algérie</text>

  <!-- Stats highlight -->
  <g transform="translate(60, 520)">
    <text font-family="Courier New, monospace" font-size="11" letter-spacing="0.2em" fill="#94a3b8">PARC TOTAL · T3 2025</text>
    <text y="58" font-family="Georgia, serif" font-size="84" font-weight="400" fill="#d4a437" letter-spacing="-0.02em">60,46 M</text>
    <text y="92" font-family="Manrope, sans-serif" font-size="16" fill="#94a3b8">d'abonnés internet · </text>
    <text x="190" y="92" font-family="Manrope, sans-serif" font-size="16" fill="#45a877">+7,07% en un an</text>
  </g>

  <!-- 3D Crystal preview (right side) -->
  <g transform="translate(800, 320)">
    <!-- Halo -->
    <circle cx="180" cy="0" r="220" fill="#d4a437" opacity="0.06" filter="url(#glow)"/>
    <circle cx="180" cy="0" r="180" fill="#d4a437" opacity="0.04"/>

    <!-- Ring -->
    <ellipse cx="180" cy="0" rx="200" ry="60" fill="none" stroke="#d4a437" stroke-width="1.5" opacity="0.3"/>

    <!-- Icosaèdre filaire central -->
    <g transform="translate(180, 0)" stroke="#d4a437" stroke-width="1.8" fill="none" opacity="0.85">
      <!-- Icosaèdre 2D approximation -->
      <polygon points="0,-100 95,-30 60,80 -60,80 -95,-30"/>
      <polygon points="0,-100 95,-30 60,80 -60,80 -95,-30" transform="rotate(36)"/>
      <line x1="0" y1="-100" x2="0" y2="-100"/>
      <line x1="0" y1="-100" x2="60" y2="80"/>
      <line x1="0" y1="-100" x2="-60" y2="80"/>
      <line x1="95" y1="-30" x2="-60" y2="80"/>
      <line x1="-95" y1="-30" x2="60" y2="80"/>
    </g>

    <!-- Cristal solide inner -->
    <g transform="translate(180, 0)" fill="#1a2238" stroke="#d4a437" stroke-width="1" opacity="0.6">
      <polygon points="0,-60 55,-20 35,50 -35,50 -55,-20"/>
    </g>

    <!-- Orbes opérateurs -->
    <circle cx="40" cy="-30" r="22" fill="#2d8a5f" opacity="0.9"/>
    <circle cx="40" cy="-30" r="35" fill="#2d8a5f" opacity="0.15"/>

    <circle cx="340" cy="40" r="18" fill="#d4a437" opacity="0.9"/>
    <circle cx="340" cy="40" r="30" fill="#d4a437" opacity="0.15"/>

    <circle cx="200" cy="160" r="14" fill="#b85042" opacity="0.9"/>
    <circle cx="200" cy="160" r="24" fill="#b85042" opacity="0.15"/>

    <!-- Lignes de connexion -->
    <line x1="180" y1="0" x2="40" y2="-30" stroke="#d4a437" stroke-width="1" opacity="0.4"/>
    <line x1="180" y1="0" x2="340" y2="40" stroke="#d4a437" stroke-width="1" opacity="0.4"/>
    <line x1="180" y1="0" x2="200" y2="160" stroke="#d4a437" stroke-width="1" opacity="0.4"/>

    <!-- Petites particules autour -->
    <circle cx="-20" cy="100" r="2" fill="#f4ede0" opacity="0.6"/>
    <circle cx="80" cy="180" r="1.5" fill="#d4a437" opacity="0.7"/>
    <circle cx="380" cy="-100" r="2" fill="#d4a437" opacity="0.5"/>
    <circle cx="420" cy="180" r="1.5" fill="#f4ede0" opacity="0.6"/>
    <circle cx="-50" cy="-80" r="2" fill="#2d8a5f" opacity="0.6"/>
    <circle cx="320" cy="-160" r="1.5" fill="#d4a437" opacity="0.5"/>
    <circle cx="-80" cy="180" r="2" fill="#d4a437" opacity="0.4"/>
    <circle cx="430" cy="-40" r="1.5" fill="#f4ede0" opacity="0.5"/>
  </g>

  <!-- Bandeau bas — Call to action -->
  <g transform="translate(60, 700)">
    <rect width="280" height="48" rx="12" fill="url(#goldGrad)"/>
    <text x="140" y="30" text-anchor="middle" font-family="Courier New, monospace" font-size="13" font-weight="700" letter-spacing="0.15em" fill="#0a0e1a">EXPLORER LE RAPPORT →</text>
  </g>

  <text x="370" y="730" font-family="Courier New, monospace" font-size="11" letter-spacing="0.15em" fill="#64748b">3D · GRAPHIQUES · EXPORTS CSV / PDF</text>

  <!-- Tag infographie en haut à droite -->
  <g transform="translate(1080, 60)">
    <rect x="-20" y="0" width="40" height="40" rx="8" fill="rgba(212,164,55,0.1)" stroke="rgba(212,164,55,0.3)"/>
    <text x="0" y="25" text-anchor="middle" font-family="Courier New, monospace" font-size="11" font-weight="700" fill="#d4a437">07</text>
  </g>
</svg>
