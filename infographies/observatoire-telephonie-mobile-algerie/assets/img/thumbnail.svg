<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#111729"/>
      <stop offset="100%" stop-color="#1a2238"/>
    </linearGradient>

    <radialGradient id="aurora" cx="0.85" cy="0.15" r="0.8">
      <stop offset="0%" stop-color="#d4a437" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d4a437" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="aurora2" cx="0.15" cy="0.95" r="0.6">
      <stop offset="0%" stop-color="#2d8a5f" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2d8a5f" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0b958"/>
      <stop offset="100%" stop-color="#d4a437"/>
    </linearGradient>

    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a437"/>
      <stop offset="100%" stop-color="#b85042"/>
    </linearGradient>

    <!-- Ground plane subtle stripes -->
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2238" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1a2238" stop-opacity="0.7"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#aurora)"/>
  <rect width="1200" height="800" fill="url(#aurora2)"/>

  <!-- Cadre subtil -->
  <rect x="20" y="20" width="1160" height="760" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1" rx="24"/>

  <!-- En-tête : marque -->
  <g transform="translate(60, 60)">
    <rect width="48" height="48" rx="10" fill="url(#markGrad)"/>
    <text x="24" y="32" text-anchor="middle" font-family="Courier New, monospace" font-size="14" font-weight="700" fill="#0a0e1a">A</text>
    <text x="64" y="22" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#f4ede0" letter-spacing="0.05em">Observatoire</text>
    <text x="64" y="42" font-family="Courier New, monospace" font-size="11" font-weight="500" fill="#94a3b8" letter-spacing="0.15em">TÉLÉPHONIE MOBILE · ALGÉRIE</text>
  </g>

  <!-- Tag série en haut à droite -->
  <g transform="translate(1080, 60)">
    <rect x="-20" y="0" width="40" height="40" rx="8" fill="rgba(212,164,55,0.1)" stroke="rgba(212,164,55,0.3)"/>
    <text x="0" y="25" text-anchor="middle" font-family="Courier New, monospace" font-size="11" font-weight="700" fill="#d4a437">02</text>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(60, 200)">
    <line x1="0" y1="8" x2="32" y2="8" stroke="#d4a437" stroke-width="1.5"/>
    <text x="44" y="12" font-family="Courier New, monospace" font-size="13" font-weight="500" letter-spacing="0.2em" fill="#d4a437">SOURCE · ARPCE — T3 2025</text>
  </g>

  <!-- Titre -->
  <text x="60" y="290" font-family="Georgia, serif" font-size="68" font-weight="400" fill="#f4ede0" letter-spacing="-0.02em">Observatoire</text>
  <text x="60" y="370" font-family="Georgia, serif" font-size="68" font-weight="400" fill="#f4ede0" letter-spacing="-0.02em">de la <tspan fill="url(#goldGrad)">Téléphonie</tspan></text>
  <text x="60" y="450" font-family="Georgia, serif" font-size="68" font-weight="400" font-style="italic" fill="#f4ede0" letter-spacing="-0.02em">Mobile en Algérie</text>

  <!-- Stats highlight -->
  <g transform="translate(60, 520)">
    <text font-family="Courier New, monospace" font-size="11" letter-spacing="0.2em" fill="#94a3b8">PARC MOBILE · T3 2025</text>
    <text y="58" font-family="Georgia, serif" font-size="84" font-weight="400" fill="#d4a437" letter-spacing="-0.02em">55,94 M</text>
    <text y="92" font-family="Manrope, sans-serif" font-size="16" fill="#94a3b8">d'abonnés mobiles · </text>
    <text x="232" y="92" font-family="Manrope, sans-serif" font-size="16" fill="#45a877">+4,65% en un an</text>
  </g>

  <!-- ============== SIGNAL FIELD (right side) ============== -->
  <g transform="translate(740, 280)">

    <!-- Sol horizon (perspective subtile) -->
    <ellipse cx="180" cy="240" rx="280" ry="35" fill="url(#ground)" opacity="0.6"/>
    <ellipse cx="180" cy="240" rx="280" ry="35" fill="none" stroke="rgba(212,164,55,0.15)" stroke-width="1"/>
    <ellipse cx="180" cy="240" rx="220" ry="26" fill="none" stroke="rgba(212,164,55,0.1)" stroke-width="1"/>
    <ellipse cx="180" cy="240" rx="150" ry="18" fill="none" stroke="rgba(212,164,55,0.08)" stroke-width="1"/>

    <!-- Wave rings — Mobilis (vert) emanating from left antenna -->
    <g opacity="0.8">
      <ellipse cx="70" cy="240" rx="40" ry="6" fill="none" stroke="#2d8a5f" stroke-width="1.5" opacity="0.7"/>
      <ellipse cx="70" cy="240" rx="80" ry="12" fill="none" stroke="#2d8a5f" stroke-width="1.2" opacity="0.45"/>
      <ellipse cx="70" cy="240" rx="120" ry="18" fill="none" stroke="#2d8a5f" stroke-width="1" opacity="0.25"/>
      <ellipse cx="70" cy="240" rx="160" ry="24" fill="none" stroke="#2d8a5f" stroke-width="1" opacity="0.12"/>
    </g>

    <!-- Wave rings — Djezzy (terre cuite) emanating from right antenna -->
    <g opacity="0.8">
      <ellipse cx="300" cy="240" rx="35" ry="5" fill="none" stroke="#b85042" stroke-width="1.5" opacity="0.7"/>
      <ellipse cx="300" cy="240" rx="70" ry="10" fill="none" stroke="#b85042" stroke-width="1.2" opacity="0.45"/>
      <ellipse cx="300" cy="240" rx="105" ry="15" fill="none" stroke="#b85042" stroke-width="1" opacity="0.25"/>
      <ellipse cx="300" cy="240" rx="140" ry="20" fill="none" stroke="#b85042" stroke-width="1" opacity="0.12"/>
    </g>

    <!-- Wave rings — Ooredoo (or) emanating from center-back antenna -->
    <g opacity="0.85">
      <ellipse cx="185" cy="245" rx="32" ry="5" fill="none" stroke="#d4a437" stroke-width="1.5" opacity="0.8"/>
      <ellipse cx="185" cy="245" rx="64" ry="9" fill="none" stroke="#d4a437" stroke-width="1.2" opacity="0.55"/>
      <ellipse cx="185" cy="245" rx="96" ry="14" fill="none" stroke="#d4a437" stroke-width="1" opacity="0.32"/>
      <ellipse cx="185" cy="245" rx="130" ry="18" fill="none" stroke="#d4a437" stroke-width="1" opacity="0.15"/>
    </g>

    <!-- ANTENNES (positions z décalées pour effet profondeur) -->

    <!-- Antenne MOBILIS (gauche, la plus haute = leader) -->
    <g>
      <!-- Haubans -->
      <line x1="70" y1="80" x2="50" y2="240" stroke="#2d8a5f" stroke-width="0.8" opacity="0.4"/>
      <line x1="70" y1="80" x2="90" y2="240" stroke="#2d8a5f" stroke-width="0.8" opacity="0.4"/>
      <!-- Mât -->
      <line x1="70" y1="80" x2="70" y2="240" stroke="#5e7a6b" stroke-width="3"/>
      <!-- Halo -->
      <circle cx="70" cy="80" r="22" fill="#2d8a5f" opacity="0.25" filter="url(#softGlow)"/>
      <circle cx="70" cy="80" r="14" fill="#2d8a5f" opacity="0.4"/>
      <!-- Sphère lumineuse -->
      <circle cx="70" cy="80" r="9" fill="#2d8a5f" filter="url(#glow)"/>
      <circle cx="70" cy="80" r="5" fill="#a8e6bd"/>
      <!-- Label opérateur -->
      <text x="70" y="270" text-anchor="middle" font-family="Courier New, monospace" font-size="10" fill="#94a3b8" letter-spacing="0.12em">MOBILIS</text>
      <text x="70" y="285" text-anchor="middle" font-family="Courier New, monospace" font-size="11" font-weight="700" fill="#45a877">41,97%</text>
    </g>

    <!-- Antenne OOREDOO (centre-arrière, intermédiaire) -->
    <g>
      <line x1="185" y1="115" x2="170" y2="245" stroke="#d4a437" stroke-width="0.8" opacity="0.4"/>
      <line x1="185" y1="115" x2="200" y2="245" stroke="#d4a437" stroke-width="0.8" opacity="0.4"/>
      <line x1="185" y1="115" x2="185" y2="245" stroke="#a89263" stroke-width="2.5"/>
      <circle cx="185" cy="115" r="20" fill="#d4a437" opacity="0.22" filter="url(#softGlow)"/>
      <circle cx="185" cy="115" r="12" fill="#d4a437" opacity="0.4"/>
      <circle cx="185" cy="115" r="8" fill="#d4a437" filter="url(#glow)"/>
      <circle cx="185" cy="115" r="4" fill="#f7ecc7"/>
      <text x="185" y="275" text-anchor="middle" font-family="Courier New, monospace" font-size="10" fill="#94a3b8" letter-spacing="0.12em">OOREDOO</text>
      <text x="185" y="290" text-anchor="middle" font-family="Courier New, monospace" font-size="11" font-weight="700" fill="#ecd28a">26,29%</text>
    </g>

    <!-- Antenne DJEZZY (droite, la plus courte par % mais visible) -->
    <g>
      <line x1="300" y1="100" x2="280" y2="240" stroke="#b85042" stroke-width="0.8" opacity="0.4"/>
      <line x1="300" y1="100" x2="320" y2="240" stroke="#b85042" stroke-width="0.8" opacity="0.4"/>
      <line x1="300" y1="100" x2="300" y2="240" stroke="#8a4a40" stroke-width="2.7"/>
      <circle cx="300" cy="100" r="21" fill="#b85042" opacity="0.22" filter="url(#softGlow)"/>
      <circle cx="300" cy="100" r="13" fill="#b85042" opacity="0.4"/>
      <circle cx="300" cy="100" r="8" fill="#b85042" filter="url(#glow)"/>
      <circle cx="300" cy="100" r="4" fill="#f5b8b0"/>
      <text x="300" y="270" text-anchor="middle" font-family="Courier New, monospace" font-size="10" fill="#94a3b8" letter-spacing="0.12em">DJEZZY</text>
      <text x="300" y="285" text-anchor="middle" font-family="Courier New, monospace" font-size="11" font-weight="700" fill="#d16b5d">31,75%</text>
    </g>

    <!-- ARCS DE COMMUNICATION (paraboliques entre antennes) -->
    <!-- Mobilis -> Djezzy -->
    <path d="M 70 80 Q 185 -20 300 100" fill="none" stroke="#d4a437" stroke-width="1.2" opacity="0.4" stroke-dasharray="2 3"/>
    <!-- Mobilis -> Ooredoo -->
    <path d="M 70 80 Q 127 30 185 115" fill="none" stroke="#d4a437" stroke-width="1" opacity="0.3" stroke-dasharray="2 3"/>
    <!-- Djezzy -> Ooredoo -->
    <path d="M 300 100 Q 242 40 185 115" fill="none" stroke="#d4a437" stroke-width="1" opacity="0.3" stroke-dasharray="2 3"/>

    <!-- Petites particules le long des arcs (communication active) -->
    <circle cx="185" cy="30" r="3" fill="#f4ede0" opacity="0.9" filter="url(#glow)"/>
    <circle cx="130" cy="60" r="2" fill="#d4a437" opacity="0.7"/>
    <circle cx="240" cy="55" r="2.5" fill="#d4a437" opacity="0.8"/>

    <!-- Particules d'ambiance (poussière dorée) -->
    <circle cx="-40" cy="120" r="1.5" fill="#d4a437" opacity="0.5"/>
    <circle cx="380" cy="150" r="2" fill="#f4ede0" opacity="0.4"/>
    <circle cx="-30" cy="200" r="1.5" fill="#d4a437" opacity="0.6"/>
    <circle cx="400" cy="180" r="1.5" fill="#d4a437" opacity="0.5"/>
    <circle cx="-20" cy="60" r="2" fill="#f4ede0" opacity="0.6"/>
    <circle cx="370" cy="50" r="1.5" fill="#d4a437" opacity="0.55"/>
    <circle cx="50" cy="-10" r="1.5" fill="#2d8a5f" opacity="0.45"/>
    <circle cx="330" cy="-20" r="2" fill="#b85042" opacity="0.45"/>
  </g>

  <!-- Bandeau bas — CTA -->
  <g transform="translate(60, 700)">
    <rect width="280" height="48" rx="12" fill="url(#goldGrad)"/>
    <text x="140" y="30" text-anchor="middle" font-family="Courier New, monospace" font-size="13" font-weight="700" letter-spacing="0.15em" fill="#0a0e1a">EXPLORER LE RAPPORT →</text>
  </g>

  <text x="370" y="730" font-family="Courier New, monospace" font-size="11" letter-spacing="0.15em" fill="#64748b">3D · 10 GRAPHIQUES · EXPORTS CSV / PDF</text>

</svg>
