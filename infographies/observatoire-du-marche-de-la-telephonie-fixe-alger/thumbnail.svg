<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#111729"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <radialGradient id="aurora" cx="0.85" cy="0.15" r="0.8">
      <stop offset="0%" stop-color="#D4A437" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D4A437" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="0.15" cy="0.95" r="0.6">
      <stop offset="0%" stop-color="#2D8A5F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2D8A5F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A437"/>
      <stop offset="100%" stop-color="#2D8A5F"/>
    </linearGradient>
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A437"/>
      <stop offset="100%" stop-color="#B85042"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#aurora)"/>
  <rect width="1200" height="800" fill="url(#aurora2)"/>
  <rect x="20" y="20" width="1160" height="760" fill="none" stroke="rgba(255,255,255,0.06)" rx="24"/>

  <!-- En-tête -->
  <g transform="translate(60, 60)">
    <rect width="48" height="48" rx="10" fill="url(#markGrad)"/>
    <text x="24" y="32" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700" fill="#0a0e1a">🇩🇿</text>
    <text x="64" y="22" font-family="Fraunces, Georgia, serif" font-size="14" font-style="italic" fill="#F4EDE0">Telecom Generator</text>
    <text x="64" y="42" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" fill="#A89880" letter-spacing="0.15em">ALGERIA TECH PREMIUM</text>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(60, 200)">
    <line x1="0" y1="8" x2="32" y2="8" stroke="#B85042" stroke-width="1.5"/>
    <text x="44" y="12" font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" letter-spacing="0.2em" fill="#B85042">ALGERIA TECH · DONNÉES SOUVERAINES</text>
  </g>

  <!-- Titre -->
  <text x="60" y="310" font-family="Fraunces, Georgia, serif" font-size="62" font-weight="500" fill="#F4EDE0" letter-spacing="-0.02em">Observatoire du Marché de la Tél</text>
  <text x="60" y="380" font-family="Fraunces, Georgia, serif" font-size="44" font-weight="400" font-style="italic" fill="url(#grad)" letter-spacing="-0.02em">éphonie Fixe Algérie 2025T3</text>

  <!-- Stats -->
  <g transform="translate(60, 460)">
    <text font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.2em" fill="#A89880">DONNÉES VISUELLES</text>
    <text y="56" font-family="Fraunces, Georgia, serif" font-size="76" font-weight="400" fill="#D4A437" letter-spacing="-0.02em">9</text>
    <text x="100" y="56" font-family="Manrope, sans-serif" font-size="16" fill="#A89880">graphiques interactifs</text>
    <text x="100" y="78" font-family="Manrope, sans-serif" font-size="16" fill="#2D8A5F">+ scène 3D · KPIs animés</text>
  </g>

  <!-- Forme centrale du thème -->
  
  <g transform="translate(850, 400)">
    <circle cx="0" cy="0" r="120" fill="none" stroke="#D4A437" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#2D8A5F" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="40" fill="#B85042" opacity="0.6" filter="url(#glow)"/>
  </g>

  <!-- CTA -->
  <g transform="translate(60, 700)">
    <rect width="280" height="48" rx="12" fill="url(#grad)"/>
    <text x="140" y="30" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" letter-spacing="0.15em" fill="#0a0e1a">EXPLORER L'INFOGRAPHIE →</text>
  </g>
  <text x="370" y="730" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.15em" fill="#A89880">3D · 9 CHARTS · EXPORTS CSV / JSON / PDF</text>
</svg>